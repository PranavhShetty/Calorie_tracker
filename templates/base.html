<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CalorieTracker{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>🥗 CalorieTracker</h1>
            </div>
           <div class="nav-links">
                <a href="{{ url_for('index') }}" class="nav-link">Home</a>
                <a href="{{ url_for('log_food') }}" class="nav-link">Log Food</a>
                <a href="{{ url_for('status') }}" class="nav-link">Today</a>
                <a href="{{ url_for('week_view') }}" class="nav-link">This Week</a>
                <a href="{{ url_for('reports') }}" class="nav-link">Reports</a>
                <a href="{{ url_for('saved_meals_page') }}" class="nav-link">Meals</a>
                <a href="{{ url_for('settings') }}" class="nav-link">Settings</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>CalorieTracker - LLM-Powered Macro Tracking for Indian Foods</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
